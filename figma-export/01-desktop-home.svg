<?xml version="1.0" encoding="UTF-8"?>
<svg id="frame-desktop-home" xmlns="http://www.w3.org/2000/svg" width="1440" height="1200" viewBox="0 0 1440 1200" role="img" aria-labelledby="frame-desktop-home-title">
  <title id="frame-desktop-home-title">Desktop Home</title>
  <desc>Editable SVG design layer for Hsin-Hsin Yuan portfolio. Import into Figma and ungroup to edit text, shapes, and image layers.</desc>
  <rect id="token-color-bg" width="1440" height="1200" fill="#0B0B0C"/>
  <g id="tokens">
    <rect id="color-accent-acid" x="-100" y="-100" width="10" height="10" fill="#D8FF3E"/>
    <rect id="color-accent-heat" x="-120" y="-100" width="10" height="10" fill="#FF4D1F"/>
    <rect id="color-accent-blue" x="-140" y="-100" width="10" height="10" fill="#7CC7FF"/>
  </g>

  <g id="layer-topbar">
    <text x="72" y="54" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="850" letter-spacing="1.4">HSIN-HSIN YUAN</text>
    <text x="1050" y="54" fill="#B8B0A3" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="750" letter-spacing="1.1">WORKS / ABOUT / CONTACT / 中文</text>
  </g>
  <g id="layer-hero">
    <g id="layer-hero-image" data-source="224be7ed-057b-400f-af63-a8582cd80cfb.webp">
    <rect x="72" y="104" width="610" height="520" fill="#242428"/>
    <image href="https://prod-img.taiwanplus.com/program/224be7ed-057b-400f-af63-a8582cd80cfb.webp" x="72" y="104" width="610" height="520" preserveAspectRatio="xMidYMid slice" opacity="0.96"/>
    <text x="90" y="606" fill="#F7F2E8" opacity="0.55" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700">224be7ed-057b-400f-af63-a8582cd80cfb.webp</text>
  </g>
    <rect x="72" y="104" width="610" height="520" fill="#0B0B0C" opacity="0.08"/>
    <text id="layer-hero-eyebrow" x="772" y="148" fill="#D8FF3E" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="850" letter-spacing="1.5">DOCUMENTARY DIRECTION FOR ARTISTS, CULTURE, AND TECHNOLOGY STORIES</text>
    <g id="layer-hero-title">
      <text x="768" y="282" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="104" font-weight="900">HSIN-HSIN</text>
      <text x="768" y="382" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="104" font-weight="900">YUAN</text>
    </g>
    <text id="layer-hero-role-1" x="772" y="420" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="650" letter-spacing="0" transform=""><tspan x="772" dy="0">Documentary Director / Writer / Producer</tspan></text>
<g id="layer-hero-role-2">
        <text x="772" y="454" fill="#D8FF3E" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">/</text>
        <text x="794" y="454" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="650">Cross-Cultural Storyteller</text>
      </g>
    <text id="layer-hero-subcopy" x="772" y="526" fill="#B8B0A3" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" letter-spacing="0" transform=""><tspan x="772" dy="0">I direct and develop documentary stories for artists,</tspan><tspan x="772" dy="28">culture, and technology teams working across Taiwan and</tspan><tspan x="772" dy="28">international contexts. I help complex subjects become</tspan><tspan x="772" dy="28">human, cinematic, and clear enough to travel.</tspan></text>
  </g>
  <g id="layer-logo-wall">
    <text x="72" y="668" fill="#B8B0A3" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" letter-spacing="1.3">PLATFORMS &amp; COLLABORATIONS</text>
    <g id="logo-taiwanplus" opacity="0.7">
    <text x="92" y="690" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">TaiwanPlus</text>
    <text x="92" y="708" fill="#B8B0A3" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700">TaiwanPlus</text>
    <line x1="92" y1="718" x2="224" y2="718" stroke="#F7F2E8" stroke-opacity="0.2"/>
  </g>
<g id="logo-public-television-service-taiwan" opacity="0.7">
    <text x="272" y="690" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">PTS</text>
    <text x="272" y="708" fill="#B8B0A3" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700">Public Television Service Taiwan</text>
    <line x1="272" y1="718" x2="404" y2="718" stroke="#F7F2E8" stroke-opacity="0.2"/>
  </g>
<g id="logo-dragon-tv" opacity="0.7">
    <text x="452" y="690" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">DRAGON TV</text>
    <text x="452" y="708" fill="#B8B0A3" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700">Dragon TV</text>
    <line x1="452" y1="718" x2="584" y2="718" stroke="#F7F2E8" stroke-opacity="0.2"/>
  </g>
<g id="logo-women-make-waves-film-festival" opacity="0.7">
    <text x="632" y="690" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">WMW</text>
    <text x="632" y="708" fill="#B8B0A3" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700">Women Make Waves Film Festival</text>
    <line x1="632" y1="718" x2="764" y2="718" stroke="#F7F2E8" stroke-opacity="0.2"/>
  </g>
<g id="logo-taiwan-international-children-s-film-festival" opacity="0.7">
    <text x="812" y="690" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">TICFF</text>
    <text x="812" y="708" fill="#B8B0A3" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700">Taiwan International Children's Film Festival</text>
    <line x1="812" y1="718" x2="944" y2="718" stroke="#F7F2E8" stroke-opacity="0.2"/>
  </g>
<g id="logo-screenhouse" opacity="0.7">
    <text x="992" y="690" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">ScreenHouse</text>
    <text x="992" y="708" fill="#B8B0A3" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700">ScreenHouse</text>
    <line x1="992" y1="718" x2="1124" y2="718" stroke="#F7F2E8" stroke-opacity="0.2"/>
  </g>
<g id="logo-happy-space" opacity="0.7">
    <text x="1172" y="690" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">幸福空間</text>
    <text x="1172" y="708" fill="#B8B0A3" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700">Happy Space</text>
    <line x1="1172" y1="718" x2="1304" y2="718" stroke="#F7F2E8" stroke-opacity="0.2"/>
  </g>
  </g>
  <g id="layer-available">
    <text x="72" y="840" fill="#D8FF3E" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="850" letter-spacing="1.4">AVAILABLE FOR</text>
    <text id="layer-available-intro" x="72" y="896" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="760" letter-spacing="0" transform=""><tspan x="72" dy="0">I can enter a project early as a story partner, direct the</tspan><tspan x="72" dy="36">shoot, shape the edit, or build repeatable editorial workflows</tspan><tspan x="72" dy="36">for short-form factual content.</tspan></text>
    <text id="layer-available-list" x="760" y="888" fill="#B8B0A3" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="500" letter-spacing="0" transform=""><tspan x="760" dy="0">Creative development</tspan><tspan x="760" dy="30">Directing</tspan><tspan x="760" dy="30">Editing</tspan><tspan x="760" dy="30">Research</tspan><tspan x="760" dy="30">Bilingual scripts</tspan><tspan x="760" dy="30">AI workflow design</tspan></text>
  </g>
</svg>
