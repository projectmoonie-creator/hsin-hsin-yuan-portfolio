<?xml version="1.0" encoding="UTF-8"?>
<svg id="frame-mobile-home" xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-labelledby="frame-mobile-home-title">
  <title id="frame-mobile-home-title">Mobile Home</title>
  <desc>Editable SVG design layer for Hsin-Hsin Yuan portfolio. Import into Figma and ungroup to edit text, shapes, and image layers.</desc>
  <rect id="token-color-bg" width="390" height="844" fill="#0B0B0C"/>
  <g id="tokens">
    <rect id="color-accent-acid" x="-100" y="-100" width="10" height="10" fill="#D8FF3E"/>
    <rect id="color-accent-heat" x="-120" y="-100" width="10" height="10" fill="#FF4D1F"/>
    <rect id="color-accent-blue" x="-140" y="-100" width="10" height="10" fill="#7CC7FF"/>
  </g>

  <g id="layer-mobile-topbar">
    <text x="24" y="42" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="850" letter-spacing="1.2">HSIN-HSIN YUAN</text>
    <text x="308" y="42" fill="#B8B0A3" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="750">中文</text>
  </g>
  <g id="layer-mobile-hero">
    <g id="layer-mobile-hero-image" data-source="placeholder">
    <rect x="24" y="76" width="342" height="252" fill="#242428"/>
    <text x="42" y="310" fill="#F7F2E8" opacity="0.55" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700">image pending</text>
  </g>
    <text id="layer-mobile-eyebrow" x="24" y="370" fill="#D8FF3E" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="850" letter-spacing="1.3">DOCUMENTARY / CULTURE / TECHNOLOGY</text>
    <g id="layer-hero-title">
      <text x="22" y="436" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="900">HSIN-HSIN</text>
      <text x="22" y="492" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="900">YUAN</text>
    </g>
    <text x="24" y="532" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="650">Documentary Director <tspan fill="#D8FF3E">/</tspan> Writer <tspan fill="#D8FF3E">/</tspan> Producer</text>
    <text x="24" y="558" fill="#D8FF3E" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">/ <tspan fill="#F7F2E8">Cross-Cultural Storyteller</tspan></text>
  </g>
  <g id="layer-logo-wall">
    <text x="24" y="596" fill="#B8B0A3" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="800" letter-spacing="1.2">PLATFORMS &amp; COLLABORATIONS</text>
    <g id="logo-taiwanplus" opacity="0.7">
    <text x="28" y="614" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">TaiwanPlus</text>
    <text x="28" y="632" fill="#B8B0A3" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700">TaiwanPlus</text>
    <line x1="28" y1="642" x2="146" y2="642" stroke="#F7F2E8" stroke-opacity="0.2"/>
  </g>
<g id="logo-public-television-service-taiwan" opacity="0.7">
    <text x="196" y="614" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">PTS</text>
    <text x="196" y="632" fill="#B8B0A3" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700">Public Television Service Taiwan</text>
    <line x1="196" y1="642" x2="314" y2="642" stroke="#F7F2E8" stroke-opacity="0.2"/>
  </g>
<g id="logo-dragon-tv" opacity="0.7">
    <text x="28" y="676" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">DRAGON TV</text>
    <text x="28" y="694" fill="#B8B0A3" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700">Dragon TV</text>
    <line x1="28" y1="704" x2="146" y2="704" stroke="#F7F2E8" stroke-opacity="0.2"/>
  </g>
<g id="logo-women-make-waves-film-festival" opacity="0.7">
    <text x="196" y="676" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">WMW</text>
    <text x="196" y="694" fill="#B8B0A3" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700">Women Make Waves Film Festival</text>
    <line x1="196" y1="704" x2="314" y2="704" stroke="#F7F2E8" stroke-opacity="0.2"/>
  </g>
  </g>
  <g id="layer-mobile-available">
    <text x="24" y="748" fill="#D8FF3E" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="850" letter-spacing="1.2">AVAILABLE FOR</text>
    <text id="layer-mobile-available-intro" x="24" y="782" fill="#F7F2E8" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="760" letter-spacing="0" transform=""><tspan x="24" dy="0">I can enter a project early as a</tspan><tspan x="24" dy="24">story partner, direct the shoot,</tspan><tspan x="24" dy="24">shape the edit, or build repeatable</tspan></text>
  </g>
</svg>
